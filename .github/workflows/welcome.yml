name: Post welcome comment
on:
  pull_request:
    types: [opened]
  permissions:
    pull-requests: write
  jobs:
    welcome: Post welcome comment
    runs-on: ubuntu-latest
    steps:
      - run: gh pr comment "$PR_URL" --body "Welcome on the repository!"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL:  ${{ github.eventpull_request.html_url }}
